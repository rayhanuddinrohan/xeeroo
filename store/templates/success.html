<!DOCTYPE html>
<html>
<head>
    <title>Order Success</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="bg-white p-10 rounded-xl shadow text-center">

        <h1 class="text-3xl font-bold text-green-600">
            🎉 Payment Successful!
        </h1>

        <p class="text-gray-600 mt-2">
            Your order has been placed successfully.
        </p>

        <div class="mt-4 rounded-xl bg-slate-50 px-5 py-4 text-left text-sm text-slate-600">
            <p><span class="font-semibold text-slate-800">Payment Method:</span> {{ payment_method }}</p>
            <p><span class="font-semibold text-slate-800">Status:</span> {{ payment_status }}</p>
        </div>

        <a href="{% url 'home' %}"
           class="mt-4 inline-block bg-green-600 text-white px-6 py-2 rounded">
            Continue Shopping
        </a>

    </div>
</div>

{% include 'includes/footer.html' %}

</body>
</html>
