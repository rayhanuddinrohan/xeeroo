{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Link Sent | Xeeroo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[linear-gradient(135deg,#f6f1e8_0%,#efe6d8_45%,#eadfcf_100%)] font-[Manrope] text-slate-900">
    <div class="mx-auto flex min-h-screen max-w-3xl items-center px-4 py-10">
        <div class="w-full rounded-[2rem] border border-[#ddd1bf] bg-white/95 p-8 text-center shadow-[0_28px_80px_rgba(62,46,24,0.08)] backdrop-blur sm:p-10">
            <img src="{% static 'images/ab-png.png' %}" alt="Xeeroo" class="mx-auto h-14 w-14 object-contain">
            <span class="mt-5 inline-flex rounded-full bg-[#f3ece2] px-4 py-2 text-[11px] font-extrabold uppercase tracking-[0.24em] text-[#86622c]">Email Sent</span>
            <h1 class="mt-5 text-3xl font-extrabold tracking-[-0.04em] text-slate-900">Reset link sent successfully.</h1>
            <p class="mx-auto mt-4 max-w-lg text-sm leading-7 text-slate-600">
                We have sent a password reset link to your email address. Please check your inbox and spam folder, then open the link to create a new password.
            </p>
            <div class="mt-8 flex flex-col gap-3 sm:flex-row sm:justify-center">
                <a href="{% url 'login' %}" class="rounded-full bg-[linear-gradient(135deg,#201914_0%,#090909_100%)] px-6 py-3 text-sm font-extrabold uppercase tracking-[0.12em] text-white shadow-[0_18px_34px_rgba(15,13,11,0.18)] transition hover:-translate-y-0.5">Go to Sign In</a>
                <a href="{% url 'home' %}" class="rounded-full border border-[#d8ccb9] px-6 py-3 text-sm font-bold text-slate-700 transition hover:bg-[#f7f2ea]">Back to Home</a>
            </div>
        </div>
    </div>

    {% include 'includes/footer.html' %}
</body>
</html>
