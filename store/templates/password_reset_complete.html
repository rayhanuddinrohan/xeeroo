{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset Complete</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="bg-white shadow">
        <div class="max-w-7xl mx-auto flex items-center justify-between p-4">
            <div class="flex items-center gap-2">
                <img src="{% static 'images/ab-png.png' %}" width="40" alt="Logo">
                <span class="font-bold text-lg text-green-600">Xeeroo</span>
            </div>

            <a href="{% url 'home' %}" class="text-gray-600 hover:text-green-600 font-medium">
                Home
            </a>
        </div>
    </div>

    <div class="flex items-center justify-center min-h-[80vh] px-4">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center">
            <h2 class="text-2xl font-bold text-green-600 mb-4">
                Password successfully changed.
            </h2>

            <p class="text-gray-600 mb-6">
                Now you can login with your new password.
            </p>

            <a href="{% url 'login' %}"
               class="inline-block bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">
                Login
            </a>
        </div>
    </div>

    {% include 'includes/footer.html' %}

</body>
</html>
